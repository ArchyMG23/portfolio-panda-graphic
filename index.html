<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PANDA_GRAPHIC | Victor Gabriel Archange</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐼</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              panda: {
                black: '#0A0A0A',
                gold: '#D4AF37',
                green: '#2D5A27',
                white: '#F8F8F8',
                grey: '#E5E5E5'
              }
            },
            fontFamily: {
              display: ['Syncopate', 'sans-serif'],
              sans: ['Space Grotesk', 'sans-serif'],
            },
            animation: {
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 5s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'ambient-light': 'ambientMove 25s ease-in-out infinite alternate',
              'grain': 'grain 8s steps(10) infinite',
            },
            keyframes: {
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(50px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-20px) rotate(2deg)' },
              },
              ambientMove: {
                '0%': { transform: 'translate(-25%, -25%) scale(1)' },
                '100%': { transform: 'translate(25%, 25%) scale(1.1)' },
              },
              grain: {
                '0%, 100%': { transform: 'translate(0, 0)' },
                '10%': { transform: 'translate(-5%, -10%)' },
                '20%': { transform: 'translate(-15%, 5%)' },
                '30%': { transform: 'translate(7%, -25%)' },
                '40%': { transform: 'translate(-5%, 25%)' },
                '50%': { transform: 'translate(-15%, 10%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-color: #F8F8F8;
        --text-color: #0A0A0A;
        --marble-opacity: 0.05;
      }
      .dark {
        --bg-color: #0A0A0A;
        --text-color: #F8F8F8;
        --marble-opacity: 0.95;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        scroll-behavior: smooth;
        overflow-x: hidden;
        position: relative;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: 
          linear-gradient(rgba(var(--bg-rgb, 248, 248, 248), var(--marble-opacity)), rgba(var(--bg-rgb, 248, 248, 248), var(--marble-opacity))),
          url('https://www.transparenttextures.com/patterns/white-marble.png');
        background-size: 800px;
        background-attachment: fixed;
        z-index: -2;
      }
      .dark body::before {
        --bg-rgb: 10, 10, 10;
      }
      .ambient-glow {
        position: fixed;
        width: 150vw;
        height: 150vh;
        top: -25vh;
        left: -25vw;
        background: radial-gradient(circle at center, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
        z-index: -1;
        pointer-events: none;
      }
      .ambient-glow-2 {
        position: fixed;
        width: 100vw;
        height: 100vh;
        top: 0;
        left: 0;
        background: radial-gradient(circle at 20% 30%, rgba(45, 90, 39, 0.1) 0%, transparent 50%);
        z-index: -1;
        pointer-events: none;
        animation: float 15s ease-in-out infinite alternate;
      }
      .marble-texture {
        background-image: url('https://www.transparenttextures.com/patterns/white-marble.png');
        background-size: 400px;
        background-color: var(--bg-color);
      }
      .reveal {
        opacity: 0;
        transform: translateY(80px) scale(0.95);
        transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .grain-overlay {
        position: fixed;
        top: -50%;
        left: -50%;
        right: -50%;
        bottom: -50%;
        width: 200%;
        height: 200%;
        background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        opacity: 0.03;
        z-index: 1000;
        pointer-events: none;
        animation: grain 8s steps(10) infinite;
      }
      @media (max-width: 768px) {
        .reveal {
          transition-duration: 0.8s;
        }
        h1, h2 {
          word-break: break-word;
        }
      }
    </style>
</head>
  <body>
    <div class="grain-overlay"></div>
    <div class="ambient-glow animate-ambient-light"></div>
    <div class="ambient-glow-2"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      const setupObserver = () => {
        const observerOptions = { threshold: 0.05 };
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
            }
          });
        }, observerOptions);
        const observeElements = () => {
          document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        };
        observeElements();
        const mutationObserver = new MutationObserver((mutations) => {
          mutations.forEach(mutation => {
            mutation.addedNodes.forEach(node => {
              if (node.nodeType === 1) { 
                if (node.classList && node.classList.contains('reveal')) {
                  observer.observe(node);
                }
                node.querySelectorAll('.reveal').forEach(el => observer.observe(el));
              }
            });
          });
        });
        mutationObserver.observe(document.body, { childList: true, subtree: true });
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupObserver);
      } else {
        setupObserver();
      }
    </script>
  </body>
</html>
